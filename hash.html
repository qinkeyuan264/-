<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>生成密码 SHA-256</title>
    <style>
      body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; padding:24px; line-height:1.6; }
      .card{ max-width: 820px; margin: 0 auto; border:1px solid rgba(0,0,0,0.12); border-radius:14px; padding:16px; }
      input,button,textarea{ font: inherit; }
      input,textarea{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid rgba(0,0,0,0.2); }
      textarea{ height: 96px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .row{ display:flex; gap:10px; flex-wrap: wrap; align-items: center; }
      .btn{ padding:10px 12px; border-radius:10px; border:1px solid rgba(0,0,0,0.2); background:#111827; color:#fff; cursor:pointer; }
      .btn2{ padding:10px 12px; border-radius:10px; border:1px solid rgba(0,0,0,0.2); background:#fff; color:#111827; cursor:pointer; }
      .muted{ color: rgba(0,0,0,0.65); font-size: 13px; }
      code{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="margin:0 0 8px;">生成密码 SHA-256（粘到 config.js）</h2>
      <div class="muted">这一步完全在本地浏览器里算，不会上传你的密码。</div>

      <div style="margin-top:14px;">
        <div class="muted">输入新密码：</div>
        <input id="pwd" type="password" autocomplete="new-password" placeholder="输入你想要的密码" />
      </div>

      <div style="margin-top:12px;" class="row">
        <button id="gen" class="btn" type="button">生成 SHA-256</button>
        <button id="copy" class="btn2" type="button">复制结果</button>
        <span id="status" class="muted"></span>
      </div>

      <div style="margin-top:12px;">
        <div class="muted">生成结果（小写 hex）：</div>
        <textarea id="out" readonly></textarea>
      </div>

      <hr style="margin:16px 0; border:0; border-top:1px solid rgba(0,0,0,0.12);" />
      <div class="muted">
        把上面生成的内容，替换到 <code>assets/config.js</code> 的 <code>PASSWORD_SHA256_HEX</code>。<br/>
        然后重新提交到 GitHub，Pages 会自动更新。
      </div>
    </div>

    <script>
      function hexFromBuffer(buffer){
        const bytes = new Uint8Array(buffer);
        let hex = "";
        for(const b of bytes) hex += b.toString(16).padStart(2, "0");
        return hex;
      }
      async function sha256Hex(text){
        const enc = new TextEncoder();
        const digest = await crypto.subtle.digest("SHA-256", enc.encode(text));
        return hexFromBuffer(digest);
      }

      const $ = (s) => document.querySelector(s);
      $("#gen").addEventListener("click", async () => {
        $("#status").textContent = "";
        const pwd = $("#pwd").value || "";
        if(!pwd){
          $("#status").textContent = "请先输入密码。";
          return;
        }
        const hex = await sha256Hex(pwd);
        $("#out").value = hex;
        $("#status").textContent = "已生成。";
      });

      $("#copy").addEventListener("click", async () => {
        const v = $("#out").value || "";
        if(!v){
          $("#status").textContent = "没有可复制的结果。";
          return;
        }
        await navigator.clipboard.writeText(v);
        $("#status").textContent = "已复制到剪贴板。";
      });
    </script>
  </body>
</html>
